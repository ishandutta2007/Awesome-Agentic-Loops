<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080710" />
      <stop offset="50%" stop-color="#0f0e26" />
      <stop offset="100%" stop-color="#05050d" />
    </linearGradient>

    <!-- Loop Path Gradient -->
    <linearGradient id="loopGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Grid Pattern for Tech Aesthetic -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.03" />
    </pattern>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
    
    .title {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 54px;
      fill: #ffffff;
      letter-spacing: -1px;
    }
    
    .subtitle {
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      font-size: 20px;
      fill: #94a3b8;
      letter-spacing: 0.5px;
    }
    
    .node-text {
      font-family: 'JetBrains+Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      fill: #e2e8f0;
      text-anchor: middle;
    }
    
    /* Animations */
    @keyframes dash {
      to {
        stroke-dashoffset: -80;
      }
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 0.4;
        transform: scale(1);
      }
      50% {
        opacity: 0.8;
        transform: scale(1.05);
      }
    }

    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    .animated-loop {
      stroke-dasharray: 15, 5;
      animation: dash 4s linear infinite;
    }

    .pulsing-glow {
      transform-origin: 850px 200px;
      animation: pulse 4s ease-in-out infinite;
    }

    .rotating-group {
      transform-origin: 850px 200px;
      animation: rotate 25s linear infinite;
    }

    .floating-banner {
      animation: float 6s ease-in-out infinite;
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="16" />
  <rect width="100%" height="100%" fill="url(#grid)" rx="16" />

  <!-- Ambient Glow Behind Loop -->
  <circle cx="850" cy="200" r="140" fill="#a855f7" opacity="0.12" filter="url(#softGlow)" />
  <circle cx="850" cy="200" r="80" fill="#00ffff" opacity="0.08" filter="url(#softGlow)" />

  <!-- Left Side: Title and Subtitle -->
  <g transform="translate(80, 150)" class="floating-banner">
    <!-- Decorative tag -->
    <rect x="0" y="-70" width="165" height="30" rx="15" fill="#312e81" stroke="#4338ca" stroke-width="1.5" opacity="0.8"/>
    <text x="82.5" y="-50" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700" fill="#a5b4fc" text-anchor="middle">AUTONOMOUS AGENTS</text>

    <!-- Main Title -->
    <text x="0" y="0" class="title">Awesome<tspan fill="#a855f7"> Agentic</tspan> Loops</text>
    
    <!-- Subtitle -->
    <text x="0" y="45" class="subtitle">A curated list of patterns, tools, and architectures</text>
    <text x="0" y="75" class="subtitle">for autonomous feedback and execution cycles in AI.</text>
  </g>

  <!-- Right Side: Interactive Agentic Loop Visualization -->
  <g class="pulsing-glow">
    <!-- Outer Track -->
    <circle cx="850" cy="200" r="130" fill="none" stroke="#1e1b4b" stroke-width="4" />
  </g>

  <g class="rotating-group">
    <!-- Active Loop Stream -->
    <circle cx="850" cy="200" r="130" fill="none" stroke="url(#loopGrad)" stroke-width="6" class="animated-loop" filter="url(#glow)" />
    
    <!-- Orbiting Nodes (Reason, Act, Observe, Repeat) -->
    <!-- Node 1: Reason -->
    <g transform="translate(850, 70)">
      <circle r="22" fill="#0f172a" stroke="#6366f1" stroke-width="3" filter="url(#glow)"/>
      <circle r="6" fill="#6366f1" />
    </g>

    <!-- Node 2: Act -->
    <g transform="translate(980, 200)">
      <circle r="22" fill="#0f172a" stroke="#a855f7" stroke-width="3" filter="url(#glow)"/>
      <circle r="6" fill="#a855f7" />
    </g>

    <!-- Node 3: Observe -->
    <g transform="translate(850, 330)">
      <circle r="22" fill="#0f172a" stroke="#ec4899" stroke-width="3" filter="url(#glow)"/>
      <circle r="6" fill="#ec4899" />
    </g>

    <!-- Node 4: Repeat -->
    <g transform="translate(720, 200)">
      <circle r="22" fill="#0f172a" stroke="#14b8a6" stroke-width="3" filter="url(#glow)"/>
      <circle r="6" fill="#14b8a6" />
    </g>
  </g>

  <!-- Static Overlay for Node Labels (to keep them upright and readable) -->
  <!-- Label 1: Reason (Top) -->
  <g transform="translate(850, 115)">
    <rect x="-45" y="-12" width="90" height="22" rx="6" fill="#090514" stroke="#4f46e5" stroke-width="1" opacity="0.9"/>
    <text y="4" class="node-text">REASON</text>
  </g>

  <!-- Label 2: Act (Right) -->
  <g transform="translate(980, 245)">
    <rect x="-35" y="-12" width="70" height="22" rx="6" fill="#090514" stroke="#c084fc" stroke-width="1" opacity="0.9"/>
    <text y="4" class="node-text">ACT</text>
  </g>

  <!-- Label 3: Observe (Bottom) -->
  <g transform="translate(850, 375)">
    <rect x="-45" y="-12" width="90" height="22" rx="6" fill="#090514" stroke="#f472b6" stroke-width="1" opacity="0.9"/>
    <text y="4" class="node-text">OBSERVE</text>
  </g>

  <!-- Label 4: Repeat (Left) -->
  <g transform="translate(720, 245)">
    <rect x="-40" y="-12" width="80" height="22" rx="6" fill="#090514" stroke="#2dd4bf" stroke-width="1" opacity="0.9"/>
    <text y="4" class="node-text">REPEAT</text>
  </g>

  <!-- Center Core element -->
  <circle cx="850" cy="200" r="45" fill="#090514" stroke="#312e81" stroke-width="2" />
  <circle cx="850" cy="200" r="35" fill="url(#loopGrad)" opacity="0.15" filter="url(#glow)"/>
  <path d="M 842 192 L 858 208 M 858 192 L 842 208" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  <circle cx="850" cy="200" r="5" fill="#ffffff" />
</svg>
